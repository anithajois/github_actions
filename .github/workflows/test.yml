name: Test Project

on: 
  pull_request: 
    branches: 
      - master
jobs:
  test:
    runs-on: ubuntu-latest
    container: 
      image: node:24
    steps:
      - uses: actions/checkout@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm test --if-present
      - run: npm run build --if-present

      